<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Editar categoria - {{ categoria.nome }}</title>
</head>
<body>

<h1>Editar categoria</h1>
    
    <form method="POST" action="/editarcategoria">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ categoria.id }}" />
        <input type="text" name="nome" value="{{ categoria.nome }}" />
        <input type="submit" value="Editar" />
</form>

</body>
</html>
